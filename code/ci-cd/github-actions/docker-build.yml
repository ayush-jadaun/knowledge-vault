# =============================================================================
# GitHub Actions — Docker Build & Push
# =============================================================================
# Builds multi-platform Docker images and pushes to ECR and GHCR.
# Features:
#   - Multi-platform builds (amd64 + arm64)
#   - Layer caching for fast builds
#   - Trivy security scanning
#   - Image signing with cosign
#   - SBOM generation
# =============================================================================

name: Docker Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write        # Push to GHCR
  id-token: write        # OIDC for AWS and cosign
  security-events: write # Upload Trivy results

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: myapp
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Build, scan, and push Docker image
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      # -------------------------------------------------------------------
      # Setup
      # -------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------------------
      # Generate image metadata (tags, labels)
      # -------------------------------------------------------------------
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            # Branch name (e.g., main)
            type=ref,event=branch
            # PR number (e.g., pr-42)
            type=ref,event=pr
            # Semantic version from tag (e.g., 1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Git SHA (short)
            type=sha,prefix=sha-
            # Latest tag on main branch
            type=raw,value=latest,enable={{is_default_branch}}

      # -------------------------------------------------------------------
      # Authenticate to registries
      # -------------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------------------
      # Build and push
      # -------------------------------------------------------------------
      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arguments
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
          # Provenance and SBOM
          provenance: true
          sbom: true

      # -------------------------------------------------------------------
      # Security scanning with Trivy
      # -------------------------------------------------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.version }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"     # Don't fail the build (change to "1" to enforce)
          ignore-unfixed: true
        # Only scan when we have a pushed image
        if: github.event_name != 'pull_request'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        if: github.event_name != 'pull_request'

      # Also run Trivy on the local build for PRs
      - name: Trivy scan (PR — local image)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      # -------------------------------------------------------------------
      # Output image info
      # -------------------------------------------------------------------
      - name: Image digest
        run: echo "Image digest - ${{ steps.build-push.outputs.digest }}"
