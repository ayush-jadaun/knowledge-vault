# =============================================================================
# Secret — Sensitive Application Configuration (TEMPLATE)
# =============================================================================
# WARNING: This is a TEMPLATE. Never commit real secrets to version control.
#
# In production, use one of these approaches:
#   1. External Secrets Operator (ESO) to sync from AWS Secrets Manager/SSM
#   2. Sealed Secrets (Bitnami) for encrypted secrets in Git
#   3. kubectl create secret from the command line
#   4. SOPS for encrypted secrets in Git
#
# To create the secret from the command line:
#   kubectl create secret generic myapp-secrets \
#     --namespace=myapp \
#     --from-literal=DATABASE_URL='postgresql://user:pass@host:5432/db' \
#     --from-literal=JWT_SECRET='your-jwt-secret' \
#     --from-literal=REDIS_PASSWORD='your-redis-password' \
#     --from-literal=AWS_ACCESS_KEY_ID='AKIA...' \
#     --from-literal=AWS_SECRET_ACCESS_KEY='...'
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: myapp-secrets
  namespace: myapp
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/component: secrets
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # Remind operators this is a template
    description: "TEMPLATE — replace placeholder values before applying"
type: Opaque

# Values must be base64-encoded.
# Encode: echo -n 'value' | base64
# Decode: echo 'base64value' | base64 -d
data:
  # DATABASE_URL: echo -n 'postgresql://user:password@host:5432/dbname?sslmode=require' | base64
  DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # JWT_SECRET: echo -n 'your-256-bit-secret' | base64
  JWT_SECRET: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # REDIS_PASSWORD: echo -n 'your-redis-password' | base64
  REDIS_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # SMTP_PASSWORD: echo -n 'your-smtp-password' | base64
  SMTP_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # STRIPE_SECRET_KEY: echo -n 'sk_live_...' | base64
  STRIPE_SECRET_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # SENTRY_DSN: echo -n 'https://...@sentry.io/...' | base64
  SENTRY_DSN: "REPLACE_WITH_BASE64_ENCODED_VALUE"

---
