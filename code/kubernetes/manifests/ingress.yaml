# =============================================================================
# Ingress — External Traffic Routing (NGINX Ingress Controller)
# =============================================================================
# Features:
#   - TLS termination with cert-manager
#   - Rate limiting
#   - CORS headers
#   - Security headers
#   - Request size limits
#   - Proxy timeouts
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp
  namespace: myapp
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/component: ingress
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # ---------------------------------------------------------------------------
    # Ingress class
    # ---------------------------------------------------------------------------
    kubernetes.io/ingress.class: nginx

    # ---------------------------------------------------------------------------
    # TLS — cert-manager automatic certificate management
    # ---------------------------------------------------------------------------
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # ---------------------------------------------------------------------------
    # Rate limiting
    # ---------------------------------------------------------------------------
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-rpm: "300"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # ---------------------------------------------------------------------------
    # CORS
    # ---------------------------------------------------------------------------
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://myapp.com,https://www.myapp.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";

    # ---------------------------------------------------------------------------
    # Proxy settings
    # ---------------------------------------------------------------------------
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # ---------------------------------------------------------------------------
    # SSL redirect
    # ---------------------------------------------------------------------------
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # ---------------------------------------------------------------------------
    # HSTS
    # ---------------------------------------------------------------------------
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "63072000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "true"

spec:
  ingressClassName: nginx

  # ---------------------------------------------------------------------------
  # TLS configuration
  # ---------------------------------------------------------------------------
  tls:
    - hosts:
        - myapp.com
        - www.myapp.com
      secretName: myapp-tls

  # ---------------------------------------------------------------------------
  # Routing rules
  # ---------------------------------------------------------------------------
  rules:
    - host: myapp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myapp
                port:
                  name: http

    - host: www.myapp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myapp
                port:
                  name: http
