# =============================================================================
# ServiceAccount — Pod Identity with IRSA (IAM Roles for Service Accounts)
# =============================================================================
# Creates a Kubernetes ServiceAccount annotated with an AWS IAM role ARN.
# When running on EKS with IRSA enabled, pods using this service account
# automatically receive temporary AWS credentials via the OIDC provider.
#
# Prerequisites:
#   1. EKS cluster with OIDC provider enabled
#   2. IAM role with trust policy for the OIDC provider
#   3. IAM role with the required permissions attached
#
# Create the IAM role:
#   eksctl create iamserviceaccount \
#     --name myapp \
#     --namespace myapp \
#     --cluster my-cluster \
#     --attach-policy-arn arn:aws:iam::ACCOUNT:policy/myapp-policy \
#     --approve
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: myapp
  namespace: myapp
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/component: service-account
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # ---------------------------------------------------------------------------
    # IRSA — IAM Role for Service Account
    # Replace with your actual IAM role ARN
    # ---------------------------------------------------------------------------
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/myapp-eks-role"

    # STS regional endpoint (recommended for reliability)
    eks.amazonaws.com/sts-regional-endpoints: "true"

    # Description
    description: "Service account for the myapp application with IRSA"

# Do not auto-mount the service account token (set per-pod in deployment)
automountServiceAccountToken: false
