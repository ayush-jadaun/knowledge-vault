# =============================================================================
# Namespace — Logical isolation for the application
# =============================================================================
# Creates a dedicated namespace with labels for:
#   - Resource organization and access control
#   - Network policy targeting
#   - Monitoring and observability
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: myapp
  labels:
    # Standard Kubernetes labels
    app.kubernetes.io/name: myapp
    app.kubernetes.io/part-of: myapp-platform
    app.kubernetes.io/managed-by: kubectl

    # Environment label
    environment: production

    # Enable Istio sidecar injection (if using Istio)
    # istio-injection: enabled

    # Pod security standards (Kubernetes 1.25+)
    # Enforce restricted security standards
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
  annotations:
    # Resource quota annotations
    description: "Production namespace for the myapp application"
---
# Optional: Resource quotas to prevent runaway resource usage
apiVersion: v1
kind: ResourceQuota
metadata:
  name: resource-quota
  namespace: myapp
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "10"
    persistentvolumeclaims: "10"
---
# Optional: Limit ranges to set default resource limits for pods
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: myapp
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 4Gi
      min:
        cpu: 50m
        memory: 64Mi
