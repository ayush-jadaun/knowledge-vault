  <!-- Inner hexagon glow -->
  <path d="M256 88 L388 164 L388 348 L256 424 L124 348 L124 164 Z"
    fill="url(#g1)" opacity="0.08"/>

  <!-- The "A" keystone — bold, angular -->
  <!-- Left leg -->
