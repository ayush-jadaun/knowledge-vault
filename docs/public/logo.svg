  <!-- Right leg -->
  <path d="M336 360 L274 152 L256 152 L306 360 Z" fill="url(#g2)"/>

  <!-- Crossbar -->
  <path d="M196 296 L220 248 L292 248 L316 296 Z" fill="url(#g1)" opacity="0.9"/>

  <!-- Top keystone crown -->
  <path d="M256 108 L232 152 L280 152 Z" fill="url(#g3)"/>

  <!-- Diamond accent at apex -->
  <path d="M256 80 L266 108 L256 136 L246 108 Z" fill="#42d392" opacity="0.9"/>

  <!-- Anime energy lines -->
  <line x1="108" y1="200" x2="140" y2="180" stroke="#5f67ee" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="100" y1="240" x2="136" y2="228" stroke="#5f67ee" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <line x1="404" y1="200" x2="372" y2="180" stroke="#42d392" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="412" y1="240" x2="376" y2="228" stroke="#42d392" stroke-width="2" opacity="0.35" stroke-linecap="round"/>

  <!-- Star particles -->
  <circle cx="172" cy="388" r="3" fill="#5f67ee" opacity="0.4"/>
  <circle cx="340" cy="388" r="3" fill="#42d392" opacity="0.4"/>
  <circle cx="256" cy="440" r="2.5" fill="#747bff" opacity="0.3"/>
