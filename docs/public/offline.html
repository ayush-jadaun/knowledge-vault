<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Archon</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .offline-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      opacity: 0.4;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 8px;
    }
    .brand {
      color: #747bff;
    }
    p {
      font-size: 15px;
      color: #8b949e;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: #5f67ee;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 32px;
    }
    .retry-btn:hover {
      background: #747bff;
    }
    .cached-section {
      width: 100%;
      max-width: 480px;
      text-align: left;
    }
    .cached-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b949e;
      margin-bottom: 12px;
    }
    .cached-list {
      list-style: none;
    }
    .cached-list li {
      margin-bottom: 4px;
    }
    .cached-list a {
      display: block;
      padding: 8px 12px;
      font-size: 13px;
      color: #747bff;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .cached-list a:hover {
      background: rgba(116, 123, 255, 0.1);
    }
    .no-cached {
      font-size: 13px;
      color: #6e7681;
      padding: 8px 12px;
    }
  </style>
</head>
<body>
  <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>

  <h1>You're offline</h1>
  <p>It looks like you've lost your internet connection. Check your connection and try again, or browse previously cached pages below.</p>

  <button class="retry-btn" onclick="window.location.reload()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Try again
  </button>

  <div class="cached-section">
    <div class="cached-title">Cached Pages</div>
    <ul class="cached-list" id="cached-pages">
      <li class="no-cached">Checking cache...</li>
    </ul>
  </div>

  <script>
    (async function() {
      const list = document.getElementById('cached-pages');
      try {
        const cache = await caches.open('kv-cache-v1');
        const keys = await cache.keys();
        const pages = keys
          .filter(r => r.url.includes('.html') || (r.mode === 'navigate' && !r.url.includes('.')))
          .map(r => {
            const url = new URL(r.url);
            return { path: url.pathname, label: decodeURIComponent(url.pathname.replace(/\//g, ' / ').replace(/\.html$/, '').trim()) || 'Home' };
          })
          .filter((v, i, a) => a.findIndex(t => t.path === v.path) === i)
          .slice(0, 15);

        if (pages.length === 0) {
          list.innerHTML = '<li class="no-cached">No cached pages available</li>';
        } else {
          list.innerHTML = pages.map(p =>
            '<li><a href="' + p.path + '">' + p.label + '</a></li>'
          ).join('');
        }
      } catch {
        list.innerHTML = '<li class="no-cached">Unable to read cache</li>';
      }
    })();
  </script>
</body>
</html>
