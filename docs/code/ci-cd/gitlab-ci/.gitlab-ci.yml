# =============================================================================
# GitLab CI/CD Pipeline
# =============================================================================
# Complete multi-stage pipeline with:
#   - Lint:   ESLint, Prettier check, Hadolint
#   - Test:   Unit tests with coverage, integration tests
#   - Build:  Docker image build with Kaniko (no Docker-in-Docker privilege)
#   - Deploy: Environment promotion (staging -> production)
#
# Required CI/CD variables (Settings > CI/CD > Variables):
#   - REGISTRY_USER          — Container registry username
#   - REGISTRY_PASSWORD      — Container registry password
#   - KUBE_CONFIG            — base64-encoded kubeconfig
#   - SLACK_WEBHOOK_URL      — Slack webhook for notifications
#   - SONAR_TOKEN            — SonarQube token (optional)
# =============================================================================

# ---------------------------------------------------------------------------
# Global defaults
# ---------------------------------------------------------------------------
default:
  # Retry failed jobs once (transient network issues, etc.)
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

  # Default image for non-Docker jobs
  image: node:20-alpine

  # Interruptible by default — new pipeline cancels old ones
  interruptible: true

# ---------------------------------------------------------------------------
# Stages — executed in order; jobs within a stage run in parallel
# ---------------------------------------------------------------------------
stages:
  - lint
  - test
  - build
  - deploy-staging
  - integration-test
  - deploy-production

# ---------------------------------------------------------------------------
# Global variables
# ---------------------------------------------------------------------------
variables:
  # npm cache directory for faster installs
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm-cache"
  # Container image tag strategy
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  IMAGE_TAG_LATEST: "$CI_REGISTRY_IMAGE:latest"
  # Kubernetes
  K8S_NAMESPACE_STAGING: "staging"
  K8S_NAMESPACE_PRODUCTION: "production"
  K8S_DEPLOYMENT: "app-deployment"
  # Feature flags
  FF_USE_FASTZIP: "true"  # faster artifact compression

# ---------------------------------------------------------------------------
# Cache — shared npm cache across all jobs
# ---------------------------------------------------------------------------
.npm-cache: &npm-cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm-cache/
      - node_modules/
    policy: pull-push

# ---------------------------------------------------------------------------
# Templates — reusable job fragments
# ---------------------------------------------------------------------------

# Template for jobs that need Node.js with dependencies installed
.node-job:
  <<: *npm-cache
  before_script:
    - npm ci --prefer-offline

# Template for kubectl-based deploy jobs
.deploy-job:
  image: bitnami/kubectl:1.29
  before_script:
    - mkdir -p $HOME/.kube
    - echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
    - chmod 600 $HOME/.kube/config

# =============================================================================
# STAGE: Lint
# =============================================================================

eslint:
  stage: lint
  extends: .node-job
  script:
    - npx eslint . --format=json --output-file=eslint-report.json || true
    - npx eslint . --max-warnings=0
  artifacts:
    when: always
    paths:
      - eslint-report.json
    reports:
      codequality: eslint-report.json
    expire_in: 7 days

prettier:
  stage: lint
  extends: .node-job
  script:
    - npx prettier --check "src/**/*.{js,ts,json,css,md}"

hadolint:
  stage: lint
  image: hadolint/hadolint:latest-debian
  script:
    - hadolint Dockerfile --format json > hadolint-report.json || true
    - hadolint Dockerfile
  artifacts:
    when: always
    paths:
      - hadolint-report.json
    expire_in: 7 days
  # Only run if Dockerfile changed
  rules:
    - changes:
        - Dockerfile
    - when: always  # still run on main branch regardless

# =============================================================================
# STAGE: Test
# =============================================================================

unit-tests:
  stage: test
  extends: .node-job
  script:
    - npm run test:unit -- --coverage --reporters=default --reporters=jest-junit
  coverage: '/All files\s*\|\s*(\d+\.?\d*)\s*\|/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 30 days

integration-tests:
  stage: test
  extends: .node-job
  # Spin up PostgreSQL and Redis as service containers
  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_DB: test_db
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_pass
    - name: redis:7-alpine
      alias: redis
  variables:
    DATABASE_URL: "postgresql://test_user:test_pass@postgres:5432/test_db"
    REDIS_URL: "redis://redis:6379"
  script:
    - npm run test:integration
  artifacts:
    when: always
    reports:
      junit: junit-integration.xml
    expire_in: 30 days

# Optional: SonarQube analysis
sonarqube:
  stage: test
  image: sonarsource/sonar-scanner-cli:latest
  needs: ["unit-tests"]
  script:
    - >
      sonar-scanner
      -Dsonar.projectKey=$CI_PROJECT_PATH_SLUG
      -Dsonar.sources=src/
      -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
      -Dsonar.host.url=$SONAR_HOST_URL
      -Dsonar.login=$SONAR_TOKEN
  rules:
    - if: $SONAR_TOKEN
      when: always
    - when: never

# =============================================================================
# STAGE: Build
# =============================================================================

build-image:
  stage: build
  # Use Kaniko for rootless Docker builds (no Docker-in-Docker needed)
  image:
    name: gcr.io/kaniko-project/executor:v1.22.0-debug
    entrypoint: [""]
  # Don't use the node cache for this job
  cache: []
  script:
    # Authenticate with GitLab's built-in container registry
    - |
      mkdir -p /kaniko/.docker
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json

    # Build and push the image
    - >
      /kaniko/executor
      --context="${CI_PROJECT_DIR}"
      --dockerfile="${CI_PROJECT_DIR}/Dockerfile"
      --destination="${IMAGE_TAG}"
      --destination="${IMAGE_TAG_LATEST}"
      --cache=true
      --cache-repo="${CI_REGISTRY_IMAGE}/cache"
      --snapshot-mode=redo
      --build-arg=BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      --build-arg=GIT_SHA="${CI_COMMIT_SHA}"
      --label="org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      --label="org.opencontainers.image.revision=${CI_COMMIT_SHA}"
  rules:
    # Build on main branch and merge requests
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Scan the built image for vulnerabilities
container-scan:
  stage: build
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: ["build-image"]
  cache: []
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format json --output trivy-report.json "${IMAGE_TAG}"
    - trivy image --exit-code 1 --severity CRITICAL "${IMAGE_TAG}"
  artifacts:
    when: always
    paths:
      - trivy-report.json
    expire_in: 30 days
  allow_failure: true  # don't block deploy for non-critical findings

# =============================================================================
# STAGE: Deploy Staging
# =============================================================================

deploy-staging:
  stage: deploy-staging
  extends: .deploy-job
  script:
    - echo "Deploying ${IMAGE_TAG} to staging..."

    # Update deployment image
    - kubectl set image deployment/${K8S_DEPLOYMENT}
        app=${IMAGE_TAG}
        -n ${K8S_NAMESPACE_STAGING}

    # Annotate with deploy metadata
    - kubectl annotate deployment/${K8S_DEPLOYMENT}
        -n ${K8S_NAMESPACE_STAGING}
        kubernetes.io/change-cause="Pipeline ${CI_PIPELINE_ID} — commit ${CI_COMMIT_SHORT_SHA}"
        --overwrite

    # Wait for rollout to finish
    - kubectl rollout status deployment/${K8S_DEPLOYMENT}
        -n ${K8S_NAMESPACE_STAGING}
        --timeout=300s
  environment:
    name: staging
    url: https://staging.example.com
    on_stop: stop-staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always

# Manual job to tear down the staging environment
stop-staging:
  stage: deploy-staging
  extends: .deploy-job
  script:
    - kubectl scale deployment/${K8S_DEPLOYMENT} --replicas=0 -n ${K8S_NAMESPACE_STAGING}
  environment:
    name: staging
    action: stop
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true

# =============================================================================
# STAGE: Integration Test (against staging)
# =============================================================================

smoke-tests:
  stage: integration-test
  image: curlimages/curl:latest
  needs: ["deploy-staging"]
  script:
    - echo "Running smoke tests against staging..."

    # Health check
    - |
      for i in $(seq 1 10); do
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://staging.example.com/healthz --max-time 5 || echo "000")
        if [ "${HTTP_CODE}" = "200" ]; then
          echo "Health check passed"
          break
        fi
        echo "Attempt ${i}/10 — HTTP ${HTTP_CODE}, retrying..."
        sleep 5
      done
      if [ "${HTTP_CODE}" != "200" ]; then
        echo "Health check failed"
        exit 1
      fi

    # API smoke test
    - curl -sf https://staging.example.com/api/v1/status | grep -q '"ok"'
    - echo "All smoke tests passed"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always

# =============================================================================
# STAGE: Deploy Production
# =============================================================================

deploy-production:
  stage: deploy-production
  extends: .deploy-job
  script:
    - echo "Deploying ${IMAGE_TAG} to production..."

    # Update deployment image
    - kubectl set image deployment/${K8S_DEPLOYMENT}
        app=${IMAGE_TAG}
        -n ${K8S_NAMESPACE_PRODUCTION}

    - kubectl annotate deployment/${K8S_DEPLOYMENT}
        -n ${K8S_NAMESPACE_PRODUCTION}
        kubernetes.io/change-cause="Pipeline ${CI_PIPELINE_ID} — commit ${CI_COMMIT_SHORT_SHA}"
        --overwrite

    # Wait for rollout
    - kubectl rollout status deployment/${K8S_DEPLOYMENT}
        -n ${K8S_NAMESPACE_PRODUCTION}
        --timeout=300s

    # Post-deploy notification
    - |
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        curl -s -X POST "$SLACK_WEBHOOK_URL" \
          -H 'Content-Type: application/json' \
          -d "{\"text\": \":rocket: *Production deploy complete* — \`${CI_COMMIT_SHORT_SHA}\` by ${GITLAB_USER_LOGIN} (<${CI_PIPELINE_URL}|Pipeline>)\"}"
      fi
  environment:
    name: production
    url: https://app.example.com
  # Manual gate — requires someone to click "Play" after staging passes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false  # block pipeline until approved

# Rollback job — manually triggered to undo the last production deploy
rollback-production:
  stage: deploy-production
  extends: .deploy-job
  script:
    - echo "Rolling back production deployment..."
    - kubectl rollout undo deployment/${K8S_DEPLOYMENT} -n ${K8S_NAMESPACE_PRODUCTION}
    - kubectl rollout status deployment/${K8S_DEPLOYMENT} -n ${K8S_NAMESPACE_PRODUCTION} --timeout=120s
    - echo "Rollback complete"
    - |
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        curl -s -X POST "$SLACK_WEBHOOK_URL" \
          -H 'Content-Type: application/json' \
          -d "{\"text\": \":warning: *Production ROLLBACK* triggered by ${GITLAB_USER_LOGIN} (<${CI_PIPELINE_URL}|Pipeline>)\"}"
      fi
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
