# =============================================================================
# Prometheus Alerting Rules
# =============================================================================
# Organized into groups by concern:
#   1. Application — HTTP error rates, latency SLO burn rate
#   2. Infrastructure — CPU, memory, disk, network
#   3. Kubernetes — pod restarts, OOM kills, pending pods
#   4. Database — PostgreSQL connection pool, replication lag
#   5. Security — TLS certificate expiry
#
# Severity levels:
#   - critical:  pages on-call immediately (PagerDuty)
#   - warning:   sends to Slack, may escalate if not resolved
#   - info:      Slack notification only, no escalation
#
# All alerts follow the SRE multi-window, multi-burn-rate approach
# for SLO-based alerting where applicable.
# =============================================================================

groups:
  # =========================================================================
  # Application Alerts
  # =========================================================================
  - name: application
    rules:
      # -----------------------------------------------------------------------
      # High HTTP error rate (5xx responses)
      # Fires when >1% of requests return 5xx over a 5-minute window.
      # -----------------------------------------------------------------------
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"
          description: >
            More than 1% of HTTP requests are returning 5xx errors
            over the last 5 minutes.
            Current error rate: {{ $value | humanizePercentage }}.
          runbook: "https://runbooks.example.com/high-error-rate"
          dashboard: "https://grafana.example.com/d/node-app/overview"

      # -----------------------------------------------------------------------
      # Elevated HTTP error rate (lower threshold, longer window)
      # -----------------------------------------------------------------------
      - alert: ElevatedErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[15m]))
            /
            sum(rate(http_requests_total[15m]))
          ) > 0.005
        for: 15m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Elevated HTTP error rate ({{ $value | humanizePercentage }})"
          description: >
            More than 0.5% of HTTP requests are returning 5xx errors
            over the last 15 minutes.

      # -----------------------------------------------------------------------
      # Latency SLO burn rate (multi-window)
      # Based on Google SRE's approach: if we're burning through our error
      # budget 14.4x faster than expected, page immediately.
      # SLO target: 99% of requests under 500ms (p99 < 500ms)
      # -----------------------------------------------------------------------
      - alert: LatencySLOBurnRateCritical
        expr: |
          (
            sum(rate(http_request_duration_seconds_bucket{le="0.5"}[1h]))
            /
            sum(rate(http_request_duration_seconds_count[1h]))
          ) < 0.99
          and
          (
            sum(rate(http_request_duration_seconds_bucket{le="0.5"}[5m]))
            /
            sum(rate(http_request_duration_seconds_count[5m]))
          ) < 0.99
        for: 2m
        labels:
          severity: critical
          team: backend
          slo: "latency-p99-500ms"
        annotations:
          summary: "Latency SLO burn rate critical — fast burn detected"
          description: >
            The 1-hour and 5-minute latency SLO compliance have both dropped
            below 99%. This indicates a rapid consumption of error budget.
            1h compliance: {{ with printf "sum(rate(http_request_duration_seconds_bucket{le=\"0.5\"}[1h])) / sum(rate(http_request_duration_seconds_count[1h]))" | query }}{{ . | first | value | humanizePercentage }}{{ end }}.

      - alert: LatencySLOBurnRateWarning
        expr: |
          (
            sum(rate(http_request_duration_seconds_bucket{le="0.5"}[6h]))
            /
            sum(rate(http_request_duration_seconds_count[6h]))
          ) < 0.99
          and
          (
            sum(rate(http_request_duration_seconds_bucket{le="0.5"}[30m]))
            /
            sum(rate(http_request_duration_seconds_count[30m]))
          ) < 0.99
        for: 15m
        labels:
          severity: warning
          team: backend
          slo: "latency-p99-500ms"
        annotations:
          summary: "Latency SLO burn rate warning — slow burn detected"
          description: >
            The 6-hour and 30-minute latency SLO compliance have both dropped
            below 99%. This is a slow burn through the error budget.

      # -----------------------------------------------------------------------
      # Node.js event loop lag — indicates the app is CPU-bound
      # -----------------------------------------------------------------------
      - alert: HighEventLoopLag
        expr: nodejs_eventloop_lag_seconds > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Node.js event loop lag is {{ $value | humanizeDuration }}"
          description: >
            Event loop lag exceeds 500ms, indicating the process is
            CPU-bound or blocked by synchronous operations.

      # -----------------------------------------------------------------------
      # Node.js heap usage approaching limit
      # -----------------------------------------------------------------------
      - alert: HighHeapUsage
        expr: |
          nodejs_heap_size_used_bytes / nodejs_heap_size_total_bytes > 0.9
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Node.js heap usage at {{ $value | humanizePercentage }}"
          description: >
            Heap usage has been above 90% for 10 minutes.
            The process may run out of memory soon.

  # =========================================================================
  # Infrastructure Alerts
  # =========================================================================
  - name: infrastructure
    rules:
      # -----------------------------------------------------------------------
      # Disk space — warn at 80%, critical at 90%
      # -----------------------------------------------------------------------
      - alert: DiskSpaceWarning
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
            /
            node_filesystem_size_bytes
          ) < 0.2
        for: 15m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Disk space low on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: >
            Less than 20% disk space remaining on {{ $labels.mountpoint }}.
            Available: {{ $value | humanizePercentage }}.

      - alert: DiskSpaceCritical
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
            /
            node_filesystem_size_bytes
          ) < 0.1
        for: 5m
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "Disk space critically low on {{ $labels.instance }}"
          description: >
            Less than 10% disk space remaining on {{ $labels.mountpoint }}.

      # -----------------------------------------------------------------------
      # Disk space predicted to fill within 4 hours
      # Uses linear prediction based on the last 6 hours of data
      # -----------------------------------------------------------------------
      - alert: DiskWillFillIn4Hours
        expr: |
          predict_linear(
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}[6h], 4*3600
          ) < 0
        for: 30m
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "Disk on {{ $labels.instance }} predicted to fill within 4 hours"
          description: >
            Based on the growth rate over the last 6 hours, the filesystem
            at {{ $labels.mountpoint }} will be full within 4 hours.

      # -----------------------------------------------------------------------
      # Memory usage — host level
      # -----------------------------------------------------------------------
      - alert: HighMemoryUsage
        expr: |
          (1 - (
            node_memory_MemAvailable_bytes
            /
            node_memory_MemTotal_bytes
          )) > 0.9
        for: 10m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Memory usage at {{ $value | humanizePercentage }} on {{ $labels.instance }}"
          description: >
            Host memory usage has been above 90% for 10 minutes.

      - alert: HighMemoryUsageCritical
        expr: |
          (1 - (
            node_memory_MemAvailable_bytes
            /
            node_memory_MemTotal_bytes
          )) > 0.95
        for: 5m
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "Memory critically high at {{ $value | humanizePercentage }} on {{ $labels.instance }}"
          description: >
            Host memory usage above 95%. OOM killer may start terminating processes.

      # -----------------------------------------------------------------------
      # High CPU usage
      # -----------------------------------------------------------------------
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 15m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "CPU usage at {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }}"

  # =========================================================================
  # Kubernetes Alerts
  # =========================================================================
  - name: kubernetes
    rules:
      # -----------------------------------------------------------------------
      # Pod restart loop — indicates a crash loop
      # -----------------------------------------------------------------------
      - alert: PodRestartLoop
        expr: |
          increase(kube_pod_container_status_restarts_total[1h]) > 5
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarting frequently"
          description: >
            Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has
            restarted {{ $value | printf "%.0f" }} times in the last hour.

      - alert: PodCrashLooping
        expr: |
          increase(kube_pod_container_status_restarts_total[15m]) > 3
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
          description: >
            Pod {{ $labels.pod }} has restarted more than 3 times in 15 minutes.

      # -----------------------------------------------------------------------
      # Pod stuck in Pending state (scheduling issue)
      # -----------------------------------------------------------------------
      - alert: PodPending
        expr: |
          kube_pod_status_phase{phase="Pending"} == 1
        for: 15m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} stuck in Pending"
          description: >
            Pod has been in Pending state for more than 15 minutes.
            Possible causes: insufficient resources, node selector mismatch,
            image pull error.

      # -----------------------------------------------------------------------
      # Container OOM killed
      # -----------------------------------------------------------------------
      - alert: ContainerOOMKilled
        expr: |
          kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        for: 0m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Container {{ $labels.container }} in {{ $labels.pod }} was OOM killed"
          description: >
            Consider increasing the memory limit for this container.

      # -----------------------------------------------------------------------
      # Deployment replica mismatch
      # -----------------------------------------------------------------------
      - alert: DeploymentReplicaMismatch
        expr: |
          kube_deployment_spec_replicas != kube_deployment_status_available_replicas
        for: 15m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Deployment {{ $labels.deployment }} has replica mismatch"
          description: >
            Desired replicas: {{ with printf "kube_deployment_spec_replicas{deployment='%s'}" $labels.deployment | query }}{{ . | first | value }}{{ end }},
            Available: {{ $value }}.

  # =========================================================================
  # Database Alerts (PostgreSQL)
  # =========================================================================
  - name: database
    rules:
      # -----------------------------------------------------------------------
      # Connection pool near exhaustion
      # -----------------------------------------------------------------------
      - alert: PostgreSQLConnectionPoolHigh
        expr: |
          pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 10m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "PostgreSQL connection pool at {{ $value | humanizePercentage }}"
          description: >
            Active connections are above 80% of max_connections.

      # -----------------------------------------------------------------------
      # Replication lag
      # -----------------------------------------------------------------------
      - alert: PostgreSQLReplicationLag
        expr: |
          pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "PostgreSQL replication lag is {{ $value | humanizeDuration }}"
          description: >
            Replication lag exceeds 30 seconds. Reads from replicas
            may return stale data.

      - alert: PostgreSQLReplicationLagCritical
        expr: |
          pg_replication_lag_seconds > 120
        for: 5m
        labels:
          severity: critical
          team: data
        annotations:
          summary: "PostgreSQL replication lag critical ({{ $value | humanizeDuration }})"

      # -----------------------------------------------------------------------
      # Slow queries
      # -----------------------------------------------------------------------
      - alert: PostgreSQLSlowQueries
        expr: |
          rate(pg_stat_statements_mean_time_seconds{quantile="0.99"}[5m]) > 1
        for: 10m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "PostgreSQL p99 query latency above 1 second"

  # =========================================================================
  # Security Alerts
  # =========================================================================
  - name: security
    rules:
      # -----------------------------------------------------------------------
      # TLS certificate expiring soon
      # -----------------------------------------------------------------------
      - alert: CertificateExpiringIn30Days
        expr: |
          (probe_ssl_earliest_cert_expiry - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "TLS certificate for {{ $labels.instance }} expires in {{ $value | printf \"%.0f\" }} days"
          description: >
            The TLS certificate will expire within 30 days.
            Renew the certificate before it expires.

      - alert: CertificateExpiringIn7Days
        expr: |
          (probe_ssl_earliest_cert_expiry - time()) / 86400 < 7
        for: 1h
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "TLS certificate for {{ $labels.instance }} expires in {{ $value | printf \"%.0f\" }} days"
          description: >
            The TLS certificate will expire within 7 days.
            Immediate renewal required.

      - alert: CertificateExpired
        expr: |
          (probe_ssl_earliest_cert_expiry - time()) < 0
        for: 0m
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "TLS certificate for {{ $labels.instance }} has EXPIRED"
          description: >
            The TLS certificate has expired. Users will see certificate
            errors. Renew immediately.
