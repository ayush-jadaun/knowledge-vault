name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'ROADMAP.md'
      - 'REMAINING_PAGES.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=24576 --max-semi-space-size=1024

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift /usr/local/graalvm /usr/local/.ghcup /opt/hostedtoolcache/go /opt/hostedtoolcache/Ruby /opt/hostedtoolcache/Python
          sudo apt-get clean
          docker system prune -af 2>/dev/null || true

      - name: Create zram + disk swap
        run: |
          sudo swapoff -a || true
          # zram compressed swap (8GB compressed ≈ 16-24GB effective)
          sudo modprobe zram 2>/dev/null || true
          if [ -e /dev/zram0 ]; then
            echo lz4 | sudo tee /sys/block/zram0/comp_algorithm 2>/dev/null || true
            echo 8G | sudo tee /sys/block/zram0/disksize
            sudo mkswap /dev/zram0
            sudo swapon -p 100 /dev/zram0
          fi
          # Disk swap fallback
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon -p 50 /mnt/swapfile
          # Tune swappiness for better performance
          sudo sysctl vm.swappiness=60
          free -h

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache VitePress
        uses: actions/cache@v4
        with:
          path: |
            docs/.vitepress/cache
            node_modules/.vite
          key: vitepress-${{ hashFiles('package-lock.json') }}-${{ hashFiles('docs/.vitepress/config.ts') }}
          restore-keys: |
            vitepress-${{ hashFiles('package-lock.json') }}-
            vitepress-

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel
          mkdir -p .vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > .vercel/project.json
          mkdir -p .vercel/output/static
          cp -r docs/.vitepress/dist/* .vercel/output/static/

          mkdir -p .vercel/output/functions/api/chat.func
          cp api/chat.js .vercel/output/functions/api/chat.func/index.js
          echo '{"runtime":"edge","entrypoint":"index.js"}' > .vercel/output/functions/api/chat.func/.vc-config.json

          mkdir -p .vercel/output/functions/api/mcp.func
          cp api/mcp.js .vercel/output/functions/api/mcp.func/index.js
          echo '{"runtime":"edge","entrypoint":"index.js"}' > .vercel/output/functions/api/mcp.func/.vc-config.json

          mkdir -p .vercel/output/functions/api/page.func
          cp api/page.js .vercel/output/functions/api/page.func/index.js
          echo '{"runtime":"edge","entrypoint":"index.js"}' > .vercel/output/functions/api/page.func/.vc-config.json

          cat > .vercel/output/config.json << 'CONF'
          {
            "version": 3,
            "routes": [
              { "src": "/api/chat", "dest": "/api/chat" },
              { "src": "/api/mcp", "dest": "/api/mcp" },
              { "src": "/api/page", "dest": "/api/page" },
              { "handle": "filesystem" },
              { "src": "/(.*)", "status": 404, "dest": "/404.html" }
            ]
          }
          CONF

          vercel deploy --prebuilt --prod --archive=tgz --token=$VERCEL_TOKEN
